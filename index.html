.cta-btn {

  color: #fff; text-align: center; text-decoration: none;

}
.chat-header-title {
  font-family: "Unbounded", sans-serif; font-size: 11px; font-weight: 600;
  color: #666; letter-spacing: 0.1em; text-transform: uppercase;
}
.chat-sync-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #333;
  transition: background 0.3s;
}
.chat-sync-dot.active { background: #51cf66; }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 2px; }
.msg { display: flex; flex-direction: column; gap: 3px; animation: fadeInUp 0.3s ease forwards; opacity: 0; }

.msg-header { display: flex; align-items: center; gap: 6px; }
.msg-avatar {

.msg-username { font-size: 12px; font-weight: 600; color: #aaa; }

.msg-text {

<script>
// 1. НАСТРОЙКА СДВИГА ВРЕМЕНИ
const TIME_SHIFT_SECONDS = 720; // 12 минут вырезано

// Читаем JSON безопасно прямо из HTML, чтобы избежать синтаксических ошибок в JS
const chatDataBlock = document.getElementById('chatData').textContent;
const rawBizonData = JSON.parse(chatDataBlock);

// 2. Обработка массива сообщений
const chatMessages = rawBizonData.data.map(item => ({
  time: (item.timeshift / 1000) - TIME_SHIFT_SECONDS, 
  username: item.username,
  message: item.message,
  role: item.role
}));

// Сортируем сообщения по времени на всякий случай
chatMessages.sort((a, b) => a.time - b.time);

const colors = [
  "#4a9eff","#ff6b6b","#51cf66","#ffd43b","#cc5de8",
  "#ff922b","#20c997","#f06595","#74c0fc","#a9e34b"
];
const userColors = {};
function getColor(name) {
  if (!userColors[name]) {
    userColors[name] = colors[Object.keys(userColors).length % colors.length];
  }
  return userColors[name];
}

const chatBox = document.getElementById("chatBox");
const syncDot = document.getElementById("syncDot");
const iframe = document.getElementById("kplayer");

let msgIndex = 0;

function addMessage(msg) {
  const color = getColor(msg.username);
  const isHost = msg.role === "host" || msg.role === "moderator";
  const safeMsg = msg.message.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML =
    "<div class='msg-header'>" +
    "<div class='msg-avatar' style='background:" + color + "'></div>" +
    "<span class='msg-username " + (isHost ? "host" : "") + "'>" + msg.username + "</span>" +
    "</div>" +
    "<div class='msg-text'>" + safeMsg + "</div>";
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function syncChatToTime(currentTime) {
  if (msgIndex > 0 && chatMessages[msgIndex - 1].time > currentTime + 1) {
    chatBox.innerHTML = "";
    msgIndex = 0;
  }
  while (msgIndex < chatMessages.length && chatMessages[msgIndex].time <= currentTime) {
    addMessage(chatMessages[msgIndex]);
    msgIndex++;
  }
}

// 3. НОВЫЙ ЖЕЛЕЗОБЕТОННЫЙ ОБРАБОТЧИК (БЕЗ ВНЕШНЕЙ БИБЛИОТЕКИ)
function sendToPlayer(method, args) {
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage({
      context: "player.js",
      method: method,
      args: args || []
    }, "*"); 
  }
}

window.addEventListener("message", function(e) {
  // Игнорируем всё, что не от Kinescope
  if (typeof e.origin === "string" && !e.origin.includes("kinescope")) return;

  var data = e.data;

  // Распаковываем строку в JSON (иногда плеер так отправляет)
  if (typeof data === "string") {
    try { data = JSON.parse(data); } catch(err) { return; }
  }

  if (!data || !data.event) return;

  // Плеер загрузился
  if (data.event === "ready") {
    syncDot.classList.add("active");
    // Самое важное: просим плеер регулярно присылать нам тайминг
    sendToPlayer("addEventListener", ["timeupdate"]);
    sendToPlayer("addEventListener", ["seeked"]);
  }

  // Ловим события времени или перемотки
  if (data.event === "timeupdate" || data.event === "seeked") {
    var currentTime = null;

    // Kinescope может прятать время в data.value или data.data
    if (data.value && typeof data.value.currentTime === "number") {
        currentTime = data.value.currentTime;
    } else if (data.data && typeof data.data.currentTime === "number") {
        currentTime = data.data.currentTime;
    }

    if (currentTime !== null) {
      syncChatToTime(currentTime);
    }
  }
});

// 4. ЗАГРУЖАЕМ ПРЕДЫСТОРИЮ ЧАТА
// Все сообщения, которые попали в "отрезанные" 12 минут (то есть time <= 0),
// выведутся сразу при загрузке страницы.
syncChatToTime(0);
</script>
