<style>

    font-family: "Unbounded", sans-serif;

  .logo {

    font-weight: 700;

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.15em;
    margin-left: auto;
  }

  .main {
    display: flex;
    width: 100%;
    max-width: 1400px;
    padding: 24px 24px 24px;
    gap: 20px;
    flex: 1;
  }

  .video-col {
    flex: 1;

    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .video-wrap {
    position: relative;
    padding-top: 56.25%;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    background: #111;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  .video-wrap iframe {
    position: absolute;
    width: 100%; height: 100%;
    top: 0; left: 0;
    border: none;
  }

  .cta-btn {
    display: block;
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #e63946 0%, #c1121f 100%);
    color: #fff;
    text-align: center;
    text-decoration: none;
    font-family: "Unbounded", sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.03em;
    border-radius: 10px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 24px rgba(230,57,70,0.35);
  }

  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(230,57,70,0.5);
  }

  .chat-col {
    width: 320px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: #111115;
    border: 1px solid #1e1e26;
    border-radius: 12px;
    overflow: hidden;
    max-height: 600px;
    min-height: 400px;
  }

  .chat-header {
    padding: 14px 16px;
    border-bottom: 1px solid #1e1e26;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .chat-header-title {
    font-family: "Unbounded", sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: #666;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .chat-count {
    margin-left: auto;
    font-size: 11px;
    color: #444;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 3px;
    animation: fadeInUp 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-header {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .msg-avatar {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
    color: #fff;
  }

  .msg-username {
    font-size: 12px;
    font-weight: 600;
    color: #aaa;
  }

  .msg-username.host { color: #e63946; }

  .msg-text {
    font-size: 13px;
    color: #d0ccc4;
    line-height: 1.5;
    padding-left: 28px;
    white-space: pre-wrap;
    word-break: break-word;
  }

    .main { flex-direction: column; padding: 12px; }

  }

const colors = [
  "#4a9eff","#ff6b6b","#51cf66","#ffd43b","#cc5de8",
  "#ff922b","#20c997","#f06595","#74c0fc","#a9e34b"
];

const userColors = {};
function getColor(name) {
  if (!userColors[name]) {
    const idx = Object.keys(userColors).length % colors.length;
    userColors[name] = colors[idx];
  }
  return userColors[name];
}

function getInitials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join("").slice(0,2).toUpperCase();
}

const chatBox = document.getElementById("chatBox");
const msgCountEl = document.getElementById("msgCount");
let displayed = 0;

function addMessage(msg) {
  const color = getColor(msg.username);
  const isHost = msg.role === "host" || msg.role === "moderator";
  const safeMsg = msg.message.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `
    <div class="msg-header">
      <div class="msg-avatar" style="background:${color}">${getInitials(msg.username)}</div>
      <span class="msg-username ${isHost ? "host" : ""}">${msg.username}</span>
    </div>
    <div class="msg-text">${safeMsg}</div>
  `;
  chatBox.appendChild(div);
  displayed++;
  
  chatBox.scrollTop = chatBox.scrollHeight;
}

let msgIndex = 0;
const startTime = Date.now();

function tick() {
  const elapsed = (Date.now() - startTime) / 1000;
  while (msgIndex < chatMessages.length && chatMessages[msgIndex].time <= elapsed) {
    addMessage(chatMessages[msgIndex]);
    msgIndex++;
  }
  if (msgIndex < chatMessages.length) {
    requestAnimationFrame(tick);
  }
}

requestAnimationFrame(tick);
</script>
