<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Debug Kinescope</title>
<style>
body { background: #111; color: #eee; font-family: monospace; padding: 20px; }
#log { background: #1a1a1a; padding: 15px; border-radius: 8px; height: 400px; overflow-y: auto; font-size: 12px; }
.video-wrap { position: relative; padding-top: 56.25%; margin-bottom: 20px; }
.video-wrap iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:0; }
</style>
</head>
<body>
<h3>Kinescope postMessage debugger</h3>
<div class="video-wrap">
  <iframe id="kplayer"
    src="https://kinescope.io/embed/bLEH99sCkehVC859Uzg6hb"
    allow="autoplay; fullscreen; picture-in-picture; encrypted-media;"
    allowfullscreen>
  </iframe>
</div>
<div id="log">Ждём сообщений от плеера...<br></div>

<script>
const log = document.getElementById('log');
window.addEventListener('message', function(e) {
  const line = document.createElement('div');
  line.style.borderBottom = '1px solid #333';
  line.style.padding = '4px 0';
  try {
    const data = typeof e.data === 'string' ? e.data : JSON.stringify(e.data, null, 2);
    line.textContent = '[' + new Date().toLocaleTimeString() + '] origin: ' + e.origin + ' | ' + data;
  } catch(err) {
    line.textContent = '[error parsing] ' + err;
  }
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
});

// Также попробуем отправить команду плееру после загрузки
setTimeout(function() {
  const iframe = document.getElementById('kplayer');
  // Kinescope API команды
  const commands = [
    { method: 'addEventListener', args: ['timeupdate'] },
    { method: 'addEventListener', args: ['play'] },
    { method: 'addEventListener', args: ['pause'] },
  ];
  commands.forEach(function(cmd) {
    iframe.contentWindow.postMessage(cmd, '*');
  });
  log.innerHTML += '<div style="color:#ffd43b">Отправили subscribe команды плееру</div>';
}, 3000);
</script>
</body>
</html>
