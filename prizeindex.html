<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talpis — Терапевтический вечер 11.04</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d14;
    --card: #13131e;
    --border: #252538;
    --accent: #ff3c6e;
    --gold: #d4b07a;
    --cyan: #00e5ff;
    --green: #4cff91;
    --text: #f0f0f8;
    --muted: #5a5a7a;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 36px 20px 80px;
  }
  body::before {
    content: '';
    position: fixed; top: -300px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 500px;
    background: radial-gradient(ellipse, rgba(255,60,110,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .container { max-width: 620px; margin: 0 auto; position: relative; }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(20px, 5vw, 32px);
    font-weight: 900;
    text-align: center;
    letter-spacing: -1px;
    margin-bottom: 32px;
    color: var(--gold);
  }
  h1 em { color: var(--gold); font-style: normal; }
  .subtitle {
    color: var(--gold);
    font-family: 'Unbounded', sans-serif;
    font-size: inherit;
    font-weight: 900;
    white-space: nowrap;
  }

  .brand {
    position: fixed;
    top: 18px; right: 24px;
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 2px;
    text-shadow: 0 0 18px rgba(212,176,122,0.5);
    z-index: 100;
    pointer-events: none;
  }

  .setup-panel { transition: opacity 0.3s; }
  .setup-panel.hidden { display: none; }

  .block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 14px;
  }
  .block-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* FILE UPLOAD */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }
  .upload-zone:hover { border-color: var(--cyan); background: rgba(0,229,255,0.03); }
  .upload-zone.loaded { border-color: var(--green); border-style: solid; background: rgba(76,255,145,0.03); }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-text { font-size: 14px; color: var(--muted); }
  .upload-text strong { color: var(--text); }
  .upload-info {
    margin-top: 12px;
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    color: var(--green);
    display: none;
  }

  .range-row {
    display: grid;
    grid-template-columns: 1fr 26px 1fr;
    align-items: center;
    gap: 8px;
  }
  .range-sep { text-align: center; font-family: 'Unbounded', sans-serif; font-size: 18px; color: var(--muted); }

  input[type="number"], input[type="text"] {
    background: #0a0a11;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 11px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="number"] { font-family: 'Unbounded', sans-serif; font-size: 15px; text-align: center; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,60,110,0.1); }
  input::placeholder { color: var(--muted); }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input.auto-set { border-color: var(--green); color: var(--green); }

  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

  .count-row { display: flex; align-items: center; gap: 12px; }
  .count-label { font-size: 14px; flex: 1; }
  .count-control {
    display: flex; align-items: center; gap: 8px;
    background: #0a0a11; border: 1px solid var(--border);
    border-radius: 12px; padding: 5px 10px;
  }
  .count-btn {
    background: none; border: none; color: var(--text);
    cursor: pointer; font-size: 20px; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; transition: background 0.15s;
  }
  .count-btn:hover { background: rgba(255,255,255,0.07); }
  .count-val {
    font-family: 'Unbounded', sans-serif; font-size: 18px;
    font-weight: 700; min-width: 28px; text-align: center; color: var(--gold);
  }

  .btn-start {
    background: linear-gradient(135deg, #ff3c6e, #ff7043);
    border: none; border-radius: 16px; color: #fff; cursor: pointer;
    font-family: 'Unbounded', sans-serif; font-size: 15px;
    font-weight: 700; letter-spacing: 1px; padding: 18px;
    width: 100%; margin-top: 4px;
    box-shadow: 0 4px 30px rgba(255,60,110,0.35);
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(255,60,110,0.5); }
  .btn-start:active { transform: scale(0.98); }

  .error-msg {
    background: rgba(255,60,110,0.1); border: 1px solid rgba(255,60,110,0.3);
    border-radius: 10px; color: var(--accent); font-size: 13px;
    padding: 10px 14px; margin-bottom: 12px; display: none;
  }
  .error-msg.show { display: block; animation: fadeIn 0.2s ease; }

  /* ── GAME PANEL ── */
  .game-panel { display: none; }
  .game-panel.show { display: block; animation: fadeIn 0.3s ease; }

  .progress-bar-wrap {
    display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
  }
  .progress-label {
    font-family: 'Unbounded', sans-serif; font-size: 11px;
    letter-spacing: 2px; color: var(--muted); white-space: nowrap;
  }
  .progress-track {
    flex: 1; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 4px; transition: width 0.5s ease;
    width: 0%;
  }

  .slot-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 32px 24px 28px;
    text-align: center;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
  }
  .slot-wrap::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,184,0,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .next-prize-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }
  .next-prize-name {
    font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 28px;
    min-height: 28px;
  }

  .slot-number {
    font-family: 'Unbounded', sans-serif;
    font-size: 72px; font-weight: 900; line-height: 1;
    color: var(--gold);
    text-shadow: 0 0 60px rgba(255,184,0,0.4);
    min-height: 90px; display: flex; align-items: center; justify-content: center;
    transition: text-shadow 0.3s;
  }
  .slot-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 24px; font-weight: 500;
    color: var(--cyan);
    min-height: 36px;
    margin-top: 16px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .slot-name.visible { opacity: 1; animation: fadeIn 0.4s ease; }

  .slot-number.spinning {
    animation: spin 0.07s infinite;
  }
  @keyframes spin {
    0%   { transform: translateY(-5px) scaleY(0.9); opacity: 0.6; }
    50%  { transform: translateY(5px) scaleY(1.05); opacity: 1; }
    100% { transform: translateY(-5px) scaleY(0.9); opacity: 0.6; }
  }
  .slot-number.landed {
    animation: land 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes land {
    0%   { transform: scale(0.7); opacity: 0; }
    60%  { transform: scale(1.12); }
    100% { transform: scale(1); opacity: 1; }
  }

  .btn-roll {
    background: linear-gradient(135deg, #ff3c6e, #ff7043);
    border: none; border-radius: 16px; color: #fff; cursor: pointer;
    font-family: 'Unbounded', sans-serif; font-size: 16px;
    font-weight: 700; letter-spacing: 1px; padding: 20px;
    width: 100%;
    box-shadow: 0 4px 30px rgba(255,60,110,0.4);
    transition: transform 0.15s, box-shadow 0.2s, background 0.3s;
    position: relative; overflow: hidden;
    margin-bottom: 24px;
  }
  .btn-roll:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(255,60,110,0.55); }
  .btn-roll:active:not(:disabled) { transform: scale(0.98); }
  .btn-roll:disabled { opacity: 0.4; cursor: default; }
  .btn-roll.done {
    background: linear-gradient(135deg, #1a5c3a, #1a7a4a);
    box-shadow: 0 4px 30px rgba(76,255,145,0.2);
  }

  .winners-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 12px;
  }

  .winner-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 18px; margin-bottom: 8px;
    animation: slideUp 0.4s cubic-bezier(0.34,1.4,0.64,1);
  }
  @keyframes slideUp {
    from { opacity:0; transform: translateY(20px) scale(0.95); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }
  .winner-card.place-1 { border-color: rgba(255,184,0,0.45); }
  .winner-card.place-2 { border-color: rgba(180,180,210,0.3); }
  .winner-card.place-3 { border-color: rgba(200,120,40,0.3); }

  .w-medal { font-size: 20px; min-width: 28px; text-align: center; }
  .w-num {
    font-family: 'Unbounded', sans-serif;
    font-size: 22px; font-weight: 900; color: var(--gold); min-width: 50px;
  }
  .w-info { flex: 1; }
  .w-name { font-size: 16px; font-weight: 600; color: var(--cyan); }
  .w-prize { font-size: 13px; font-weight: 500; color: var(--text); margin-top: 2px; }
  .w-prize small {
    display: block; font-size: 10px; color: var(--muted); margin-top: 2px;
    text-transform: uppercase; letter-spacing: 1.5px; font-family: 'Unbounded', sans-serif;
  }

  .btn-reset {
    background: none; border: 1px solid var(--border);
    border-radius: 14px; color: var(--muted); cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    padding: 14px; width: 100%; margin-top: 8px;
    transition: all 0.2s;
  }
  .btn-reset:hover { border-color: var(--cyan); color: var(--cyan); }

  canvas#confetti {
    position: fixed; top:0; left:0; width:100%; height:100%;
    pointer-events: none; z-index: 999;
  }

  .participants-preview {
    margin-top: 12px;
    max-height: 120px;
    overflow-y: auto;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    padding: 8px 0;
    text-align: left;
  }
  .participants-preview::-webkit-scrollbar { width: 4px; }
  .participants-preview::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div class="container">
  <div class="brand">Talpis</div>
  <h1>Терапевтический вечер 31.03</h1>

  <!-- SETUP -->
  <div class="setup-panel" id="setup-panel">
    <div class="error-msg" id="error-msg"></div>

    <div class="block">
      <div class="block-title">База участников</div>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept=".xlsx,.xls,.csv">
        <div class="upload-icon">📋</div>
        <div class="upload-text" id="upload-text">
          <strong>Нажми или перетащи</strong> файл .xlsx с именами
        </div>
        <div class="upload-info" id="upload-info"></div>
        <div class="participants-preview" id="participants-preview"></div>
      </div>
    </div>

    <div class="block">
      <div class="block-title">Диапазон (авто из файла)</div>
      <div class="range-row">
        <input type="number" id="range-from" placeholder="От" value="1" readonly>
        <div class="range-sep">–</div>
        <input type="number" id="range-to" placeholder="До" value="0" readonly>
      </div>
    </div>

    <div class="block">
      <div class="block-title">Количество победителей</div>
      <div class="count-row">
        <div class="count-label">Сколько человек выиграют?</div>
        <div class="count-control">
          <button class="count-btn" onclick="changeCount(-1)">−</button>
          <div class="count-val" id="count-val">3</div>
          <button class="count-btn" onclick="changeCount(1)">+</button>
        </div>
      </div>
    </div>

    <div class="block">
      <div class="block-title">Приз</div>
      <input type="text" id="single-prize" placeholder="Название приза для всех победителей" value="Главный приз 🎁">
    </div>

    <button class="btn-start" onclick="startGame()">▶ &nbsp;Начать розыгрыш</button>
  </div>

  <!-- GAME -->
  <div class="game-panel" id="game-panel">

    <div class="progress-bar-wrap">
      <div class="progress-label" id="progress-label">0 / 3</div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div class="slot-wrap">
      <div class="next-prize-label" id="prize-label">Следующий приз</div>
      <div class="next-prize-name" id="prize-name">—</div>
      <div class="slot-number" id="slot-number">?</div>
      <div class="slot-name" id="slot-name"></div>
    </div>

    <button class="btn-roll" id="btn-roll" onclick="rollOne()">🎲 &nbsp;КРУТИТЬ!</button>

    <div class="winners-section" id="winners-section">
      <div class="winners-label" id="winners-label" style="display:none">Уже выиграли</div>
      <div id="winners-list"></div>
    </div>

    <button class="btn-reset" onclick="resetGame()">↩ Начать заново</button>
  </div>
</div>

<script>
  const medals = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
  let winCount = 3;

  // Participants from file
  let participants = [];

  // Game state
  let pool = [], revealed = 0, spinning = false;

  // ── FILE UPLOAD ──
  document.getElementById('file-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = new Uint8Array(ev.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        participants = [];
        for (let i = 0; i < json.length; i++) {
          const row = json[i];
          if (row && row[0] && String(row[0]).trim()) {
            participants.push(String(row[0]).trim());
          }
        }

        if (participants.length === 0) {
          showError('Файл пустой или не удалось прочитать имена!');
          return;
        }

        // Update range
        document.getElementById('range-from').value = 1;
        document.getElementById('range-to').value = participants.length;
        document.getElementById('range-from').classList.add('auto-set');
        document.getElementById('range-to').classList.add('auto-set');

        const zone = document.getElementById('upload-zone');
        zone.classList.add('loaded');
        document.getElementById('upload-text').innerHTML = '<strong>✓ ' + file.name + '</strong>';
        const info = document.getElementById('upload-info');
        info.style.display = 'block';
        info.textContent = participants.length + ' участников загружено';

        // Preview
        const preview = document.getElementById('participants-preview');
        let html = '';
        const show = Math.min(participants.length, 5);
        for (let i = 0; i < show; i++) {
          html += '<div>' + (i+1) + '. ' + participants[i] + '</div>';
        }
        if (participants.length > 5) {
          html += '<div style="color:var(--muted)">...</div>';
          html += '<div>' + participants.length + '. ' + participants[participants.length-1] + '</div>';
        }
        preview.innerHTML = html;

      } catch (err) {
        showError('Ошибка чтения файла: ' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  });

  function changeCount(delta) {
    winCount = Math.max(1, Math.min(20, winCount + delta));
    document.getElementById('count-val').textContent = winCount;
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3500);
  }

  let prizeName = '';

  function startGame() {
    if (participants.length === 0) {
      showError('Сначала загрузи файл с участниками!');
      return;
    }

    const total = participants.length;
    if (total < winCount) {
      showError('Участников (' + total + ') меньше, чем победителей (' + winCount + ')!');
      return;
    }

    prizeName = document.getElementById('single-prize').value.trim() || 'Приз';

    // Generate unique random indices
    const used = new Set();
    pool = [];
    while (pool.length < winCount) {
      const n = Math.floor(Math.random() * total);
      if (!used.has(n)) { used.add(n); pool.push(n); }
    }
    revealed = 0;

    document.getElementById('setup-panel').classList.add('hidden');
    document.getElementById('game-panel').classList.add('show');
    document.getElementById('winners-list').innerHTML = '';
    document.getElementById('winners-label').style.display = 'none';

    updateUI();
  }

  function updateUI() {
    const total = pool.length;
    const done  = revealed;
    const pct   = (done / total) * 100;

    document.getElementById('progress-label').textContent = `${done} / ${total}`;
    document.getElementById('progress-fill').style.width = pct + '%';

    if (done < total) {
      const prizeName_display = prizeName;
      document.getElementById('prize-label').textContent = `Победитель ${done+1} из ${total}`;
      document.getElementById('prize-name').textContent = prizeName_display || '—';
      document.getElementById('slot-number').textContent = '?';
      document.getElementById('slot-number').className = 'slot-number';
      document.getElementById('slot-name').textContent = '';
      document.getElementById('slot-name').className = 'slot-name';
      const btn = document.getElementById('btn-roll');
      btn.disabled = false;
      btn.className = 'btn-roll';
      btn.textContent = '🎲  КРУТИТЬ!';
    } else {
      document.getElementById('prize-label').textContent = 'Розыгрыш завершён!';
      document.getElementById('prize-name').textContent = '🎉 Все победители определены';
      document.getElementById('slot-number').textContent = '✓';
      document.getElementById('slot-number').className = 'slot-number';
      document.getElementById('slot-name').textContent = '';
      document.getElementById('slot-name').className = 'slot-name';
      const btn = document.getElementById('btn-roll');
      btn.disabled = true;
      btn.className = 'btn-roll done';
      btn.textContent = '✓  Готово!';
      launchConfetti();
    }
  }

  function rollOne() {
    if (spinning || revealed >= pool.length) return;
    spinning = true;
    const btn = document.getElementById('btn-roll');
    btn.disabled = true;

    const slotEl = document.getElementById('slot-number');
    const nameEl = document.getElementById('slot-name');
    slotEl.className = 'slot-number spinning';
    nameEl.className = 'slot-name';
    nameEl.textContent = '';

    const targetIdx = pool[revealed];
    const targetNum = targetIdx + 1;
    const targetName = participants[targetIdx];
    const total = participants.length;

    let ticks = 0;
    const maxTicks = 22;

    const iv = setInterval(() => {
      const fakeIdx = Math.floor(Math.random() * total);
      slotEl.textContent = fakeIdx + 1;
      ticks++;
      if (ticks >= maxTicks) {
        clearInterval(iv);
        slotEl.className = 'slot-number landed';
        slotEl.textContent = targetNum;
        setTimeout(() => {
          nameEl.textContent = targetName;
          nameEl.className = 'slot-name visible';
        }, 300);
        addWinnerCard(revealed, targetNum, targetName, prizeName);
        revealed++;
        spinning = false;
        setTimeout(() => updateUI(), 2000);
      }
    }, 65);
  }

  function addWinnerCard(idx, num, name, prize) {
    document.getElementById('winners-label').style.display = 'block';
    const list = document.getElementById('winners-list');
    const card = document.createElement('div');
    card.className = `winner-card place-${idx+1}`;
    card.innerHTML = `
      <div class="w-medal">${medals[idx] || (idx+1)}</div>
      <div class="w-num">#${num}</div>
      <div class="w-info">
        <div class="w-name">${name}</div>
        <div class="w-prize">${prize || '<span style="color:var(--muted)">—</span>'}<small>Место ${idx+1}</small></div>
      </div>
    `;
    list.insertBefore(card, list.firstChild);
    if (idx === 0) launchConfettiSmall();
  }

  function resetGame() {
    revealed = 0; pool = [];
    document.getElementById('game-panel').classList.remove('show');
    document.getElementById('setup-panel').classList.remove('hidden');
    document.getElementById('slot-number').textContent = '?';
    document.getElementById('slot-name').textContent = '';
    document.getElementById('slot-name').className = 'slot-name';
    document.getElementById('winners-list').innerHTML = '';
  }

  function launchConfettiSmall() { confettiBurst(60, 0.6); }
  function launchConfetti() { confettiBurst(160, 1); }

  function confettiBurst(count, scale) {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ['#ff3c6e','#ffb800','#00e5ff','#ff7043','#a259ff','#4cff91'];
    const pieces = Array.from({length: count}, () => ({
      x: Math.random() * canvas.width, y: canvas.height * 0.4,
      r: (Math.random() * 7 + 3) * scale,
      c: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() * 12 - 6) * scale,
      vy: (Math.random() * -14 - 2) * scale,
      rot: Math.random() * 360, rs: Math.random() * 10 - 5,
      shape: Math.random() > 0.5 ? 'rect' : 'circle'
    }));
    let frame = 0;
    const maxFrames = Math.round(100 * scale + 40);
    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(p => {
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI/180);
        ctx.fillStyle = p.c; ctx.globalAlpha = Math.max(0, 1 - frame/maxFrames);
        if (p.shape === 'circle') { ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill(); }
        else { ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r); }
        ctx.restore();
        p.x += p.vx; p.y += p.vy; p.vy += 0.4; p.rot += p.rs;
      });
      frame++;
      if (frame < maxFrames) requestAnimationFrame(draw);
      else ctx.clearRect(0,0,canvas.width,canvas.height);
    }
    draw();
  }


</script>
